name: 'Nightly builds'
on:
  schedule:
    - cron: '0 0 * * *' # Run at 12 AM UTC.
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  SOURCE_REF: trunk
  TARGET_REF: nightly
  RELEASE_ID: 25945111

permissions: { }

jobs:
  build:
    if: github.repository_owner == 'woocommerce'
    name: 'Nightly builds'

    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 'Update nightly tag commit ref'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const sourceRef = process.env.SOURCE_REF;
            const targetRef = process.env.TARGET_REF;
            const branchData = await github.rest.repos.getBranch({
              ...context.repo,
              branch: sourceRef,
            });

            await github.rest.git.updateRef({
              ...context.repo,
              ref: `tags/${ targetRef }`,
              sha: branchData.data.commit.sha,
            });

      - name: 'Checkout ref'
        uses: 'actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0' # v7.0.0
        with:
          ref: ${{ env.TARGET_REF }}

      - name: 'Setup WooCommerce Monorepo'
        uses: './.github/actions/setup-woocommerce-monorepo'
        with:
          pull-package-deps: '@woocommerce/plugin-woocommerce'

      - name: 'Build zip'
        working-directory: plugins/woocommerce
        run: bash bin/build-zip.sh

      - name: 'Upload nightly build'
        working-directory: plugins/woocommerce
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          asset_name="woocommerce-${SOURCE_REF}-nightly.zip"
          cp woocommerce.zip "$asset_name"
          gh release upload "$TARGET_REF" "$asset_name" --clobber --repo "$GITHUB_REPOSITORY"

      - name: 'Update nightly release notes'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const sourceRef = process.env.SOURCE_REF;
            const builtAt = new Date().toISOString().replace('T', ' ').replace(/\..+/, ' UTC');
            const body = [
              `Nightly build, regenerated every night from \`${ sourceRef }\`.`,
              '',
              `Last update: **${ builtAt }**`,
            ].join('\n');

            await github.rest.repos.updateRelease({
              ...context.repo,
              release_id: Number(process.env.RELEASE_ID),
              body,
              target_commitish: sourceRef,
            });
