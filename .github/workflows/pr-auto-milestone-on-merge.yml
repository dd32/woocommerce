name: 'Auto-assign milestone on merge'

on:
  pull_request_target:
    types: [closed]
    branches: [trunk]

permissions:
  contents: read
  pull-requests: write

jobs:
  assign-milestone:
    name: 'Assign milestone if so instructed'
    if: github.event.pull_request.merged == true && github.event.pull_request.milestone == null
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Fork PRs need this. Without it, under pull_request_target checkout defaults its commit
          # to github.sha, which for a merged fork PR is the merge commit that actions/checkout
          # refuses to check out due to its "pwn request" guard.
          ref: ${{ github.event.pull_request.base.ref }}
          sparse-checkout: |
            .github/workflows/scripts

      - name: Assign milestone
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const script = require('./.github/workflows/scripts/assign-milestone-on-merge.js');
            await script({ github, context, core });
