name: 'Require milestone on pull requests'

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - edited
      - synchronize
      - ready_for_review
      - milestoned
      - demilestoned
    branches:
        - trunk

permissions:
  contents: read
  pull-requests: read

jobs:
  ensure-milestone:
    name: 'Ensure milestone is or will be assigned'
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: |
            .github/workflows/scripts

      - name: 'Validate milestone or checkbox selection'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const script = require('./.github/workflows/scripts/validate-milestone-selection.js');
            await script({ github, context, core });
